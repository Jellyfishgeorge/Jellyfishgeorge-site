t.y,2.5,5,0,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.moveTo(t.x-5,t.y);ctx.lineTo(t.x+5,t.y);ctx.stroke();ctx.beginPath();ctx.moveTo(t.x-5,t.y-2);ctx.bezierCurveTo(t.x-2,t.y-4,t.x+2,t.y-4,t.x+5,t.y-2);ctx.stroke();}if(t.landed){ctx.fillStyle=cols[t.tier]||'#ff69b4';ctx.font="bold 11px 'Courier New'";ctx.textBaseline='top';ctx.fillText(t.label,t.x,t.y+9);}}else{ctx.globalAlpha=t.landed?1:0.88+Math.sin(frame*0.3+i*1.4)*0.12;const r=t.landed?7:11;ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(t.x,t.y,r,0,Math.PI*2);ctx.fill();ctx.strokeStyle=t.landed?'rgba(0,0,0,0.4)':'rgba(255,255,255,0.45)';ctx.lineWidth=1.5;ctx.stroke();ctx.fillStyle=t.landed?'rgba(0,0,0,0.75)':'rgba(0,0,0,0.65)';ctx.font=`bold ${t.landed?9:13}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('★',t.x,t.y+1);if(t.landed){ctx.fillStyle='#FFD700';ctx.font="bold 11px 'Courier New'";ctx.textBaseline='top';ctx.fillText(t.label,t.x,t.y+9);}}ctx.restore();});}
function drawAnnouncement(){if(!announcement)return;const a=announcement;const fade=a.timer<12?a.timer/12:1;a.particles.forEach(p=>{ctx.save();ctx.globalAlpha=p.life*fade;ctx.fillStyle=p.color;ctx.fillRect(p.x-3,p.y-3,6,6);ctx.restore();});ctx.save();ctx.globalAlpha=fade;const bw=420,bh=110,bxA=W/2-bw/2,byA=H/2-bh/2;ctx.fillStyle='rgba(0,0,0,0.82)';ctx.fillRect(bxA,byA,bw,bh);ctx.strokeStyle=a.color;ctx.lineWidth=3;ctx.strokeRect(bxA,byA,bw,bh);ctx.shadowBlur=20;ctx.shadowColor=a.color;ctx.strokeRect(bxA,byA,bw,bh);ctx.shadowBlur=0;ctx.fillStyle=a.color;ctx.font="bold 36px 'Courier New'";ctx.textAlign='center';ctx.fillText(a.title,W/2,H/2+8);ctx.fillStyle='#fff';ctx.font="bold 15px 'Courier New'";ctx.fillText(a.sub,W/2,H/2+36);ctx.restore();}
function updateTrophies(){trophyAnims.forEach(t=>{if(t.type==='gia')t.tx=vaLX+t.tier*20;else if(t.slot!==undefined)t.tx=bbLX+t.slot*20;if(!t.landed){t.x+=(t.tx-t.x)*0.08;t.y+=(t.ty-t.y)*0.08;if(Math.hypot(t.tx-t.x,t.ty-t.y)<3){t.x=t.tx;t.y=t.ty;t.landed=true;}}else{t.x=t.tx;}});}
loop();
