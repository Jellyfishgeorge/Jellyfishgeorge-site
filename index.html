<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The First Concert on the Moon</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050508; color: #fff; font-family: system-ui, sans-serif; overflow-x: hidden; }
    .hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px 20px; position: relative; }
    .hero canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
    .hero-content { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; gap: 52px; }
    h1 { font-size: clamp(32px, 7vw, 80px); font-weight: 200; letter-spacing: 0.12em; text-transform: uppercase; line-height: 1.1; }
    .moon-o { display: inline-block; vertical-align: middle; height: 0.82em; width: 0.58em; margin: 0 0.01em; }
    .date-line { font-size: clamp(12px, 1.8vw, 18px); font-weight: 300; letter-spacing: 0.3em; color: rgba(180,220,255,0.5); text-transform: uppercase; }
    .countdown { display: flex; gap: 40px; }
    .cd-unit { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .cd-num { font-size: clamp(24px, 3.5vw, 44px); font-weight: 200; color: rgba(180,220,255,0.85); }
    .cd-label { font-size: 9px; letter-spacing: 0.22em; color: rgba(255,255,255,0.25); text-transform: uppercase; }
    .cta-wrapper { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .cta-sub { font-size: 13px; letter-spacing: 0.06em; color: rgba(255,255,255,0.3); }
    .cta { background: none; border: 1px solid rgba(180,220,255,0.35); color: rgba(180,220,255,0.9); padding: 18px 56px; font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase; cursor: pointer; transition: all 0.3s; }
    .cta:hover { background: rgba(120,200,255,0.08); border-color: rgba(180,220,255,0.7); color: #fff; }
    .scroll-hint { position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.2); font-size: 18px; animation: bob 2s ease-in-out infinite; z-index: 1; }
    @keyframes bob { 0%,100%{transform:translateX(-50%) translateY(0);} 50%{transform:translateX(-50%) translateY(8px);} }
    .map-label { text-align: center; padding: 48px 20px 16px; font-size: 11px; letter-spacing: 0.25em; color: rgba(255,255,255,0.25); text-transform: uppercase; }
    .counter-line { font-size: 14px; color: rgba(255,255,255,0.35); letter-spacing: 0.04em; text-align: center; padding: 0 20px 24px; }
    .counter-line span { color: rgba(180,220,255,0.8); }
    #map { height: 480px; width: 100%; }
    .leaflet-container { background: #050508 !important; }
    .thoughts { padding: 60px 20px; max-width: 700px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }
    .thoughts-title { font-size: 11px; letter-spacing: 0.25em; color: rgba(255,255,255,0.25); text-transform: uppercase; margin-bottom: 8px; text-align: center; }
    .thought { padding: 14px 18px; border-left: 1px solid rgba(120,200,255,0.15); }
    .thought-text { font-size: 14px; color: rgba(255,255,255,0.65); line-height: 1.6; }
    .thought-from { font-size: 12px; color: rgba(120,200,255,0.45); margin-top: 4px; }
    .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
    .modal-bg.open { display: flex; }
    .modal { background: #0d0d14; border: 1px solid rgba(255,255,255,0.1); padding: 40px; width: 360px; max-width: 90vw; display: flex; flex-direction: column; gap: 18px; position: relative; }
    .modal h2 { font-size: 15px; font-weight: 400; letter-spacing: 0.1em; text-transform: uppercase; }
    .modal p { font-size: 13px; color: rgba(255,255,255,0.4); line-height: 1.5; }
    .modal input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 12px 16px; font-size: 14px; outline: none; width: 100%; transition: border 0.2s; }
    .modal input:focus { border-color: rgba(120,200,255,0.4); }
    .modal input::placeholder { color: rgba(255,255,255,0.3); }
    .btn-full { width: 100%; padding: 13px; font-size: 13px; letter-spacing: 0.1em; cursor: pointer; text-transform: uppercase; transition: all 0.2s; }
    .btn-email { background: rgba(120,200,255,0.12); border: 1px solid rgba(120,200,255,0.3); color: rgba(160,220,255,0.9); }
    .btn-email:hover { background: rgba(120,200,255,0.22); }
    .btn-google { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.12); color: rgba(255,255,255,0.65); display: flex; align-items: center; justify-content: center; gap: 10px; }
    .btn-google:hover { background: rgba(255,255,255,0.09); color: #fff; }
    .divider { display: flex; align-items: center; gap: 12px; color: rgba(255,255,255,0.2); font-size: 12px; }
    .divider::before,.divider::after { content:''; flex:1; height:1px; background:rgba(255,255,255,0.08); }
    .toggle-link { font-size: 13px; color: rgba(255,255,255,0.35); text-align: center; cursor: pointer; }
    .toggle-link span { color: rgba(120,200,255,0.7); text-decoration: underline; }
    .close-btn { position: absolute; top: 12px; right: 14px; background: none; border: none; color: rgba(255,255,255,0.3); font-size: 20px; cursor: pointer; }
    .close-btn:hover { color: #fff; }
    .msg-box { font-size: 13px; padding: 10px; text-align: center; display: none; }
    .msg-box.error { background: rgba(255,80,80,0.1); color: rgba(255,120,120,0.9); border: 1px solid rgba(255,80,80,0.2); }
    .msg-box.success { background: rgba(80,200,120,0.1); color: rgba(120,220,160,0.9); border: 1px solid rgba(80,200,120,0.2); }
  </style>
</head>
<body>

<section class="hero">
  <canvas id="c"></canvas>
  <div class="hero-content">
    <h1>The First Concert<br>on the M<svg class="moon-o" viewBox="0 0 60 80" xmlns="http://www.w3.org/2000/svg"><defs><clipPath id="cp1"><circle cx="30" cy="40" r="34"/></clipPath></defs><circle cx="30" cy="40" r="34" fill="rgba(255,255,255,0.88)"/><circle cx="48" cy="30" r="30" fill="#050508" clip-path="url(#cp1)"/></svg><svg class="moon-o" viewBox="0 0 60 80" xmlns="http://www.w3.org/2000/svg"><defs><clipPath id="cp2"><circle cx="30" cy="40" r="34"/></clipPath></defs><circle cx="30" cy="40" r="34" fill="rgba(255,255,255,0.88)"/><circle cx="14" cy="48" r="26" fill="#050508" clip-path="url(#cp2)"/></svg>n</h1>
    <div class="date-line">October 25, 2036</div>
    <div class="countdown">
      <div class="cd-unit"><div class="cd-num" id="cd-d">-</div><div class="cd-label">Days</div></div>
      <div class="cd-unit"><div class="cd-num" id="cd-h">-</div><div class="cd-label">Hours</div></div>
      <div class="cd-unit"><div class="cd-num" id="cd-m">-</div><div class="cd-label">Min</div></div>
      <div class="cd-unit"><div class="cd-num" id="cd-s">-</div><div class="cd-label">Sec</div></div>
    </div>
    <div class="cta-wrapper">
      <div class="cta-sub">Get your ticket and join us on the map</div>
      <button class="cta" onclick="handleTicket()">Ticket — $1</button>
    </div>
  </div>
  <div class="scroll-hint">↓</div>
</section>

<div class="counter-line"><span id="ticket-count">10</span> people watching from <span id="country-count">7</span> countries</div>
<div id="map"></div>

<section class="thoughts">
  <div class="thoughts-title">What's your biggest dream right now?</div>
  <div id="thoughts-list"></div>
</section>

<div class="modal-bg" id="modal">
  <div class="modal">
    <button class="close-btn" onclick="closeModal()">×</button>
    <h2>Get Your Ticket</h2>
    <p>$1. One seat. The moon.<br>October 25, 2036.</p>
    <div id="msg-box" class="msg-box"></div>
    <input type="email" id="em" placeholder="Email"/>
    <input type="password" id="pw" placeholder="Password"/>
    <div style="display:flex;flex-direction:column;gap:12px">
      <button class="btn-full btn-email" onclick="handleEmail()">Continue with email</button>
      <div class="divider">or</div>
      <button class="btn-full btn-google" onclick="handleGoogle()">
        <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>
    </div>
    <div class="toggle-link" id="toggle" onclick="toggleMode()">Already have an account? <span>Sign in</span></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const sb = supabase.createClient(
    'https://zytnjivtwjyqemoffotd.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5dG5qaXZ0d2p5cWVtb2Zmb3RkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMTIyMzMsImV4cCI6MjA4OTg4ODIzM30.WR-3Yd4ZO9W0VX-m3YCP1JmmdyngPFBlx2XxFSwzkH0'
  );

  const STRIPE_LINK = 'https://buy.stripe.com/bJe6oG44xe446V5153cEw01';
  let mode = 'signup';

  function tick() {
    const diff = new Date('2036-10-25T20:00:00') - new Date();
    if(diff<=0) return;
    const d = Math.floor(diff/86400000);
    document.getElementById('cd-d').textContent = String(d).padStart(3,'0');
    document.getElementById('cd-h').textContent = String(Math.floor((diff%86400000)/3600000)).padStart(2,'0');
    document.getElementById('cd-m').textContent = String(Math.floor((diff%3600000)/60000)).padStart(2,'0');
    document.getElementById('cd-s').textContent = String(Math.floor((diff%60000)/1000)).padStart(2,'0');
  }
  setInterval(tick,1000); tick();

  const isMobile = window.innerWidth < 768;
  const worldBounds = L.latLngBounds([-75, -180], [85, 180]);
  const map = L.map('map',{zoomControl:false,scrollWheelZoom:false,dragging:isMobile,touchZoom:false,doubleClickZoom:false,attributionControl:false,maxBounds:worldBounds,maxBoundsViscosity:1.0}).setView([20,0],2);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
  const dotIcon = L.divIcon({html:'<div style="width:8px;height:8px;background:rgba(120,200,255,0.85);border-radius:50%;box-shadow:0 0 10px rgba(120,200,255,0.7)"></div>',iconSize:[8,8],className:''});

  [[51.5,-0.1,'London'],[-33.9,18.4,'Cape Town'],[35.7,139.7,'Tokyo'],[-8.4,115.2,'Bali'],[40.7,-74.0,'New York'],[-23.5,-46.6,'São Paulo'],[48.8,2.3,'Paris'],[1.3,103.8,'Singapore'],[-37.8,144.9,'Melbourne'],[19.4,-99.1,'Mexico City']].forEach(([a,b,n])=>{
    L.marker([a,b],{icon:dotIcon}).addTo(map);
  });

  const seedThoughts = [
    {name:'Jelly', city:'Jungutbatu', country:'Indonesia', message:'To give a concert on the moon for the entire world.'},
    {name:'Mariana', city:'São Paulo', country:'Brazil', message:'To build a school in my hometown before I turn 40.'},
    {name:'Kenji', city:'Tokyo', country:'Japan', message:'To see my father proud of me before he\'s gone.'},
    {name:'Amara', city:'Cape Town', country:'South Africa', message:'To prove that music from Africa can move the whole planet.'},
    {name:'Tom', city:'London', country:'United Kingdom', message:'To write one song that outlives me.'},
    {name:'Sofia', city:'Mexico City', country:'Mexico', message:'To dance at the first concert on the moon.'},
  ];

  async function loadTickets() {
    const {data} = await sb.from('tickets').select('lat,lng,city,country,message,name').order('created_at',{ascending:false});
    const realData = data || [];
    document.getElementById('ticket-count').textContent = realData.length + 10;
    const baseCountries = new Set(['United Kingdom','South Africa','Japan','Indonesia','United States','Brazil','France','Singapore','Australia','Mexico']);
    const realCountries = new Set(realData.map(d=>d.country).filter(Boolean));
    const allCountries = new Set([...baseCountries, ...realCountries]);
    document.getElementById('country-count').textContent = allCountries.size;
    realData.forEach(t=>{if(t.lat&&t.lng)L.marker([t.lat,t.lng],{icon:dotIcon}).addTo(map);});
    const list = document.getElementById('thoughts-list');
    const combined = [...realData.filter(t=>t.message), ...seedThoughts].slice(0,8);
    combined.forEach(t=>{
      const el=document.createElement('div');
      el.className='thought';
      el.innerHTML=`<div class="thought-text">"${t.message}"</div><div class="thought-from">— ${[t.name, t.city, t.country].filter(Boolean).join(', ')}</div>`;
      list.appendChild(el);
    });
  }
  loadTickets();

  function handleTicket() {
    sb.auth.getSession().then(({data:{session}})=>{
      if(session) window.location.href=STRIPE_LINK;
      else openModal('signup');
    });
  }

  function openModal(m){mode=m;document.getElementById('modal').classList.add('open');document.getElementById('toggle').innerHTML=m==='signup'?'Already have an account? <span>Sign in</span>':"Don't have an account? <span>Join</span>";hideMsg();}
  function closeModal(){document.getElementById('modal').classList.remove('open');}
  function toggleMode(){openModal(mode==='signup'?'signin':'signup');}
  function showMsg(t,c){const el=document.getElementById('msg-box');el.textContent=t;el.className=`msg-box ${c}`;el.style.display='block';}
  function hideMsg(){document.getElementById('msg-box').style.display='none';}

  async function handleEmail(){
    const email=document.getElementById('em').value.trim(),pass=document.getElementById('pw').value;
    if(!email||!pass){showMsg('Email and password required.','error');return;}
    let err;
    if(mode==='signup'){({error:err}=await sb.auth.signUp({email,password:pass}));if(!err){window.location.href=STRIPE_LINK;return;}}
    else{({error:err}=await sb.auth.signInWithPassword({email,password:pass}));if(!err){window.location.href=STRIPE_LINK;return;}}
    if(err)showMsg(err.message,'error');
  }

  async function handleGoogle(){
    const{error}=await sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:STRIPE_LINK}});
    if(error)showMsg(error.message,'error');
  }

  const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
  let W,H,t=0;
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  window.addEventListener('resize',resize);resize();
  function drawJelly(cx,cy,r,ph){
    ctx.save();ctx.translate(cx,cy);
    const p=1+Math.sin(ph*0.7)*0.05;
    ctx.beginPath();ctx.ellipse(0,0,r*p,r*0.65*p,0,Math.PI,0);
    ctx.bezierCurveTo(r*0.6*p,r*0.22*p,-r*0.6*p,r*0.22*p,-r*p,0);
    const g=ctx.createRadialGradient(0,-r*0.2,r*0.05,0,0,r*1.1);
    g.addColorStop(0,`rgba(180,230,255,${0.28+Math.sin(ph)*0.05})`);
    g.addColorStop(0.5,'rgba(100,170,240,0.16)');g.addColorStop(1,'rgba(40,80,180,0)');
    ctx.fillStyle=g;ctx.fill();
    ctx.strokeStyle=`rgba(180,230,255,${0.35+Math.sin(ph)*0.08})`;ctx.lineWidth=1.5;ctx.stroke();
    for(let i=0;i<14;i++){
      const tx=(i/13-0.5)*r*1.5,sw=Math.sin(ph+i*0.5)*22,sw2=Math.sin(ph*0.6+i*0.3)*12;
      ctx.beginPath();ctx.moveTo(tx,r*0.12*p);
      ctx.bezierCurveTo(tx+sw*0.3,r*0.6,tx+sw+sw2,r*1.2,tx+sw*1.4,r*1.8+Math.sin(ph+i)*22);
      ctx.strokeStyle=`rgba(160,220,255,${0.18+Math.sin(ph+i)*0.06})`;ctx.lineWidth=1+Math.sin(ph+i*0.7)*0.4;ctx.stroke();
    }
    ctx.restore();
  }
  function loop(){
    t+=0.012;ctx.clearRect(0,0,W,H);
    const grd=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*0.5);
    grd.addColorStop(0,'rgba(20,40,80,0.2)');grd.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
    const base=Math.min(W,H);
    drawJelly(W*0.18+Math.sin(t*0.3)*15, H*0.38+Math.sin(t*0.2)*12, base*0.18, t);
    drawJelly(W*0.52+Math.sin(t*0.27)*10, H*0.24+Math.sin(t*0.33)*8, base*0.13, t+1.8);
    drawJelly(W*0.94+Math.sin(t*0.22)*8, H*0.38+Math.sin(t*0.28)*10, base*0.17, t+3.1);
    drawJelly(W*0.76+Math.sin(t*0.25)*12, H*0.68+Math.sin(t*0.19)*8, base*0.10, t+5.0);
    requestAnimationFrame(loop);
  }
  loop();
</script>
</body>
</html>
