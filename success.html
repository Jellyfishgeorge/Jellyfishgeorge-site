<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're on the map — Moon Concert</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050508; color: #fff; font-family: system-ui, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { max-width: 440px; width: 100%; display: flex; flex-direction: column; gap: 28px; text-align: center; }
    .top-label { font-size: 11px; letter-spacing: 0.3em; color: rgba(180,220,255,0.4); text-transform: uppercase; }
    h1 { font-size: clamp(22px, 4vw, 32px); font-weight: 200; letter-spacing: 0.08em; line-height: 1.3; }
    .sub { font-size: 14px; color: rgba(255,255,255,0.4); line-height: 1.6; }
    .field-group { display: flex; flex-direction: column; gap: 12px; text-align: left; }
    .field-label { font-size: 11px; letter-spacing: 0.2em; color: rgba(255,255,255,0.3); text-transform: uppercase; }
    .input-wrap { position: relative; }
    input, textarea { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 13px 16px; font-size: 14px; font-family: system-ui, sans-serif; outline: none; transition: border 0.2s; resize: none; }
    input:focus, textarea:focus { border-color: rgba(120,200,255,0.4); }
    input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.25); }
    .suggestions { position: absolute; top: 100%; left: 0; right: 0; background: #0d0d18; border: 1px solid rgba(255,255,255,0.1); border-top: none; z-index: 10; max-height: 200px; overflow-y: auto; }
    .suggestion-item { padding: 11px 16px; font-size: 13px; color: rgba(255,255,255,0.65); cursor: pointer; transition: background 0.15s; }
    .suggestion-item:hover { background: rgba(120,200,255,0.08); color: #fff; }
    textarea { height: 80px; }
    .btn { background: none; border: 1px solid rgba(180,220,255,0.35); color: rgba(180,220,255,0.9); padding: 16px; font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase; cursor: pointer; transition: all 0.3s; width: 100%; }
    .btn:hover { background: rgba(120,200,255,0.08); border-color: rgba(180,220,255,0.7); color: #fff; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .msg { font-size: 13px; padding: 10px; text-align: center; display: none; }
    .msg.error { background: rgba(255,80,80,0.1); color: rgba(255,120,120,0.9); border: 1px solid rgba(255,80,80,0.2); }
    .msg.success { background: rgba(80,200,120,0.1); color: rgba(120,220,160,0.9); border: 1px solid rgba(80,200,120,0.2); }
  </style>
</head>
<body>
  <div class="card">
    <div class="top-label">Ticket confirmed</div>
    <h1>Let's put your pin<br>on the map.</h1>
    <p class="sub">Where are you watching from?</p>

    <div class="field-group">
      <div class="field-label">Your name</div>
      <div class="input-wrap">
        <input type="text" id="name-input" placeholder="What's your name?" autocomplete="off" />
      </div>
    </div>

    <div class="field-group">
      <div class="field-label">Your location</div>
      <div class="input-wrap">
        <input type="text" id="location-input" placeholder="Detecting..." autocomplete="off" oninput="onLocationInput()" />
        <div class="suggestions" id="suggestions" style="display:none;"></div>
      </div>
    </div>

    <div class="field-group">
      <div class="field-label">Message <span style="color:rgba(255,255,255,0.2);font-size:10px;letter-spacing:0.1em;">(optional)</span></div>
      <textarea id="message-input" placeholder="What&#39;s your biggest dream right now?"></textarea>
    </div>

    <div id="msg" class="msg"></div>
    <button class="btn" id="submit-btn" onclick="submit()">Put me on the map</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const sb = supabase.createClient(
      'https://zytnjivtwjyqemoffotd.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5dG5qaXZ0d2p5cWVtb2Zmb3RkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMTIyMzMsImV4cCI6MjA4OTg4ODIzM30.WR-3Yd4ZO9W0VX-m3YCP1JmmdyngPFBlx2XxFSwzkH0'
    );

    let selectedLat = null, selectedLng = null, selectedCity = null, selectedCountry = null;
    let searchTimeout = null;

    async function detectLocation() {
      try {
        const res = await fetch('https://ipapi.co/json/');
        const data = await res.json();
        if (data.city && data.country_name) {
          document.getElementById('location-input').value = `${data.city}, ${data.country_name}`;
          selectedLat = data.latitude;
          selectedLng = data.longitude;
          selectedCity = data.city;
          selectedCountry = data.country_name;
        }
      } catch(e) {
        document.getElementById('location-input').placeholder = 'Type your city...';
      }
    }
    detectLocation();

    async function onLocationInput() {
      const q = document.getElementById('location-input').value.trim();
      selectedLat = null; selectedLng = null; selectedCity = null; selectedCountry = null;
      clearTimeout(searchTimeout);
      if (q.length < 2) { hideSuggestions(); return; }
      searchTimeout = setTimeout(async () => {
        try {
          const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=5&addressdetails=1`, { headers: { 'Accept-Language': 'en' } });
          const data = await res.json();
          showSuggestions(data);
        } catch(e) {}
      }, 300);
    }

    function showSuggestions(results) {
      const box = document.getElementById('suggestions');
      if (!results.length) { hideSuggestions(); return; }
      box.innerHTML = '';
      results.forEach(r => {
        const city = r.address?.city || r.address?.town || r.address?.village || r.address?.county || r.name;
        const country = r.address?.country || '';
        const label = [city, country].filter(Boolean).join(', ');
        const item = document.createElement('div');
        item.className = 'suggestion-item';
        item.textContent = label;
        item.onclick = () => {
          document.getElementById('location-input').value = label;
          selectedLat = parseFloat(r.lat);
          selectedLng = parseFloat(r.lon);
          selectedCity = city;
          selectedCountry = country;
          hideSuggestions();
        };
        box.appendChild(item);
      });
      box.style.display = 'block';
    }

    function hideSuggestions() { document.getElementById('suggestions').style.display = 'none'; }
    document.addEventListener('click', e => { if (!e.target.closest('.input-wrap')) hideSuggestions(); });

    function showMsg(text, type) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = `msg ${type}`;
      el.style.display = 'block';
    }

    async function submit() {
      if (!selectedLat || !selectedLng) {
        const q = document.getElementById('location-input').value.trim();
        if (!q) { showMsg('Please enter your location.', 'error'); return; }
        try {
          const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1&addressdetails=1`, { headers: { 'Accept-Language': 'en' } });
          const data = await res.json();
          if (!data.length) { showMsg('Location not found. Try a city name.', 'error'); return; }
          const r = data[0];
          selectedLat = parseFloat(r.lat);
          selectedLng = parseFloat(r.lon);
          selectedCity = r.address?.city || r.address?.town || r.address?.village || r.name;
          selectedCountry = r.address?.country || '';
        } catch(e) { showMsg('Could not resolve location. Try again.', 'error'); return; }
      }

      const name = document.getElementById('name-input').value.trim();
      const message = document.getElementById('message-input').value.trim();
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'Saving...';

      const { data: { session } } = await sb.auth.getSession();

      const { error } = await sb.from('tickets').insert({
        lat: selectedLat,
        lng: selectedLng,
        city: selectedCity,
        country: selectedCountry,
        message: message || null,
        name: name || null,
        user_id: session?.user?.id || null
      });

      if (error) {
        showMsg(error.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Put me on the map';
        return;
      }
           const card = document.querySelector('.card');
      card.style.transition = 'opacity 0.4s';
      card.style.opacity = '0';
      setTimeout(() => {
        card.innerHTML = `
          <div class="top-label">Mission complete</div>
          <h1>Epic.<br>You're on the map.</h1>
          <p class="sub" style="color:rgba(120,220,160,0.85);font-size:15px;">You just unlocked BaksoGratis.</p>
          <p class="sub">Feed 10,000 people one bakso bowl at a time. The game is yours.</p>
          <a href="/baksogratis.html" style="text-decoration:none;display:block;width:100%;">
            <button class="btn" style="border-color:rgba(255,155,0,0.5);color:rgba(255,185,60,0.9);">Play Game →</button>
          </a>
          <div onclick="window.location.href='/'" style="font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.2);cursor:pointer;padding-top:4px;">Check your pin on the map ↗</div>
        `;
        card.style.opacity = '1';
      }, 400);
      setTimeout(() => { window.location.href = '/'; }, 7000);

    }
  </script>
</body>
</html>
